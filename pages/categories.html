    <div class="modal-header">
      <h4></h4>
      <button class="close-modal" type="button">Go Back</button>
    </div>

        <label>Name</label>
        <input type="text" id="task-title" name="name" placeholder="Enter title" required />
      </div>
    </form>

  <div id="confirmModal" class="modal-overlay">
  <div class="confirm-modal">
    
    <div class="confirm-icon">
      <i class="fa-solid fa-triangle-exclamation"></i>
    </div>

    <h4 id="confirmText">Are you sure?</h4>

    <p class="confirm-subtext">
      This action cannot be undone.
    </p>

    <div class="confirm-actions">
      <button id="confirmNo" class="cancel-btn">Cancel</button>
      <button id="confirmYes" class="confirm-btn">Delete</button>
    </div>

  </div>
